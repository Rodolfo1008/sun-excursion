<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUN · Control de Ingreso</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Nunito+Sans:wght@400;600&display=swap');

    :root {
      --pink: #F0196E;
      --yellow: #FFE847;
      --white: #FFFFFF;
      --dark-pink: #C4105A;
      --soft: rgba(255,255,255,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--pink);
      font-family: 'Nunito Sans', sans-serif;
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px 16px;
      border-bottom: 2px solid rgba(255,232,71,0.2);
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 22px;
      color: var(--white);
      letter-spacing: 2px;
    }

    .header-text p {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    /* COUNTER BAR */
    .counter-bar {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      background: rgba(0,0,0,0.15);
    }

    .counter-card {
      flex: 1;
      background: var(--soft);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
    }

    .counter-card .num {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 28px;
      color: var(--white);
      line-height: 1;
    }

    .counter-card .label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
    }

    /* PROGRESS BAR */
    .progress-wrap {
      padding: 0 24px 16px;
      background: rgba(0,0,0,0.15);
    }

    .progress-track {
      background: rgba(255,255,255,0.2);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }

    .progress-fill {
      background: var(--white);
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }

    /* MAIN */
    main {
      flex: 1;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* SCAN RESULT */
    .scan-box {
      background: var(--soft);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .scan-box.success {
      border-color: var(--white);
      background: rgba(255,255,255,0.18);
      animation: pulse-in 0.4s ease;
    }

    .scan-box.error {
      border-color: #ff6b6b;
      background: rgba(255,107,107,0.15);
    }

    @keyframes pulse-in {
      0% { transform: scale(0.97); opacity: 0.7; }
      60% { transform: scale(1.02); }
      100% { transform: scale(1); opacity: 1; }
    }

    .scan-icon {
      font-size: 36px;
      line-height: 1;
    }

    .scan-name {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 22px;
      color: var(--white);
    }

    .scan-id {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }

    .scan-status {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
    }

    .scan-idle {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* MISSING SECTION */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }

    .toggle-btn {
      background: var(--soft);
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 99px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 700;
      color: var(--white);
      cursor: pointer;
      font-family: 'Nunito Sans', sans-serif;
      letter-spacing: 0.5px;
    }

    .missing-list {
      display: none;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
    }

    .missing-list.open {
      display: flex;
    }

    .missing-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--soft);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .missing-item .m-id {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.4);
      width: 56px;
      flex-shrink: 0;
    }

    .missing-item .m-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 40px;
      color: rgba(255,232,71,0.4);
      font-size: 13px;
      font-weight: 600;
    }

    /* SCROLLBAR */
    .missing-list::-webkit-scrollbar { width: 4px; }
    .missing-list::-webkit-scrollbar-track { background: transparent; }
    .missing-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 99px; }
  </style>
</head>
<body>

  <header>
    <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Sun rays -->
      <line x1="50" y1="8" x2="50" y2="22" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
      <line x1="30" y1="14" x2="37" y2="26" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
      <line x1="70" y1="14" x2="63" y2="26" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
      <!-- Horizontal bar -->
      <rect x="28" y="28" width="44" height="9" rx="4.5" fill="#FFFFFF"/>
      <!-- U body -->
      <path d="M34 37 L34 68 Q34 80 50 80 Q66 80 66 68 L66 37" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- Wave -->
      <path d="M32 88 Q41 83 50 88 Q59 93 68 88" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" fill="none"/>
    </svg>
    <div class="header-text">
      <h1>SUN</h1>
      <p>Control de ingreso</p>
    </div>
    <button onclick="resetAll()" style="margin-left:auto;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);border-radius:99px;padding:6px 14px;font-size:11px;font-weight:700;color:white;cursor:pointer;font-family:'Nunito Sans',sans-serif;letter-spacing:0.5px;">Reiniciar</button>
  </header>

  <div class="counter-bar">
    <div class="counter-card">
      <div class="num" id="count-in">0</div>
      <div class="label">Ingresaron</div>
    </div>
    <div class="counter-card">
      <div class="num" id="count-missing">—</div>
      <div class="label">Faltan</div>
    </div>
    <div class="counter-card">
      <div class="num" id="count-total">—</div>
      <div class="label">Total</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <main>
    <!-- Scan Result -->
    <div class="scan-box" id="scan-box">
      <div class="scan-icon">🔍</div>
      <div class="scan-idle">Acerca una pulsera para registrar ingreso</div>
    </div>

    <!-- Missing Students -->
    <div>
      <div class="section-header">
        <span class="section-title">Faltantes</span>
        <button class="toggle-btn" id="toggle-btn" onclick="toggleMissing()">Ver lista</button>
      </div>
      <div style="height:10px"></div>
      <div class="missing-list" id="missing-list">
        <div class="loading">Cargando participantes...</div>
      </div>
    </div>
  </main>

  <script>
    const SHEET_ID = '1NMWXtLPU8S0bVbFXo5aCTUT8AeF9UnoDzVnqLWutkxE';
    const SHEET_NAME = 'Hoja1';
    const STORAGE_KEY = 'sun_checked_in';

    let allStudents = [];
    let checkedIn = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
    let listOpen = false;

    function saveCheckedIn() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...checkedIn]));
    }

    // ── Load students from Google Sheet ──────────────────────────────
    async function loadStudents() {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
      try {
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(47).slice(0, -2));
        const rows = json.table.rows;

        allStudents = rows
          .map(r => ({
            id: r.c[0]?.v?.toString().trim() || '',
            nombre: r.c[1]?.v?.toString().trim() || ''
          }))
          .filter(s => s.id && s.id.toUpperCase() !== 'ID');

        updateCounters();
        renderMissingList();
      } catch (e) {
        console.error('Error cargando participantes:', e);
      }
    }

    // ── Read URL param on load ────────────────────────────────────────
    function checkURLParam() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (id) registerStudent(id.toUpperCase());
    }

    // ── Register a student ────────────────────────────────────────────
    function registerStudent(id) {
      const box = document.getElementById('scan-box');

      if (allStudents.length === 0) {
        showBox(box, 'error', '⏳', 'Cargando datos...', 'Intenta en un momento');
        return;
      }

      const student = allStudents.find(s => s.id.toUpperCase() === id.toUpperCase());

      if (!student) {
        showBox(box, 'error', '❌', id, 'Participante no encontrado');
        return;
      }

      const alreadyIn = checkedIn.has(student.id);
      checkedIn.add(student.id);
      saveCheckedIn();
      updateCounters();
      renderMissingList();

      if (alreadyIn) {
        showBox(box, 'success', '✅', student.nombre, student.id + ' · Ya registrado anteriormente');
      } else {
        showBox(box, 'success', '✅', student.nombre, student.id + ' · ¡Ingreso registrado!');
      }

      // Clean URL without reload
      window.history.replaceState({}, '', window.location.pathname);
    }

    function showBox(box, state, icon, name, status) {
      box.className = 'scan-box ' + state;
      box.innerHTML = `
        <div class="scan-icon">${icon}</div>
        <div class="scan-name">${name}</div>
        <div class="scan-status">${status}</div>
      `;
    }

    // ── Counters & progress ───────────────────────────────────────────
    function updateCounters() {
      const total = allStudents.length;
      const inCount = checkedIn.size;
      const missing = total - inCount;

      document.getElementById('count-in').textContent = inCount;
      document.getElementById('count-missing').textContent = total > 0 ? missing : '—';
      document.getElementById('count-total').textContent = total > 0 ? total : '—';

      const pct = total > 0 ? (inCount / total) * 100 : 0;
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    // ── Missing list ──────────────────────────────────────────────────
    function renderMissingList() {
      const list = document.getElementById('missing-list');
      if (!listOpen) return;

      const missing = allStudents.filter(s => !checkedIn.has(s.id));

      if (missing.length === 0) {
        list.innerHTML = `<div class="loading">🎉 ¡Todos han ingresado!</div>`;
        return;
      }

      list.innerHTML = missing.map(s => `
        <div class="missing-item">
          <span class="m-id">${s.id}</span>
          <span class="m-name">${s.nombre}</span>
        </div>
      `).join('');
    }

    function toggleMissing() {
      listOpen = !listOpen;
      const list = document.getElementById('missing-list');
      const btn = document.getElementById('toggle-btn');
      list.classList.toggle('open', listOpen);
      btn.textContent = listOpen ? 'Ocultar' : 'Ver lista';
      if (listOpen) renderMissingList();
    }

    // ── Watch for URL changes (NFC tap reopens same tab) ─────────────
    // Polling approach — some browsers don't fire popstate on NFC
    let lastSearch = window.location.search;
    setInterval(() => {
      if (window.location.search !== lastSearch) {
        lastSearch = window.location.search;
        checkURLParam();
      }
    }, 500);

    window.addEventListener('popstate', checkURLParam);

    // ── Reset ─────────────────────────────────────────────────────────
    function resetAll() {
      if (!confirm('¿Reiniciar el conteo? Esto borrará todos los ingresos registrados.')) return;
      checkedIn.clear();
      saveCheckedIn();
      updateCounters();
      renderMissingList();
      const box = document.getElementById('scan-box');
      box.className = 'scan-box';
      box.innerHTML = '<div class="scan-icon">🔍</div><div class="scan-idle">Acerca una pulsera para registrar ingreso</div>';
    }

    // ── Init ──────────────────────────────────────────────────────────
    loadStudents().then(checkURLParam);
  </script>
</body>
</html>
